<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <meta name="description" content="Kogabe is a computer software development company that offers services at very affordable prices">
        <title>Kogabe - Coming Soon</title>
        <style>
            body {
                font-family: monospace; 
                margin: 0;
                overflow: hidden; 
                background: #000;
                color: #fff; 
                }

            .container {
                position: absolute;
                top: 50%;
                left: 50%;
                transform: translate(-50%, -50%);
                text-align: center;
                }

            .logo {
                font-size: 48px;
                font-weight: bold;
                margin-bottom: 20px;
                text-shadow: 0 0 5px rgba(0, 255, 255, 0.8); 
                }

            .title {
                font-size: 28px;
                font-weight: bold;
                margin-bottom: 15px;
                text-transform: uppercase; 
                animation: blink 1s infinite alternate; 
                }

            @keyframes blink {
                from {
                    opacity: 1;
                }
                to {
                    opacity: 0.2;
                }
                }

            .description {
                font-size: 18px;
                line-height: 1.5; 
                margin-bottom: 30px;
                }

            .matrix {
                position: absolute;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                }

            .matrix span {
                position: absolute;
                font-size: 11px;
                opacity: 0.4; 
                animation: matrix-drop 5s linear infinite; 
                }

            @keyframes matrix-drop {
                0% {
                    top: -100%;
                }
                100% {
                    top: 120%;
                }
                }

            
            .footer {
                position: fixed;
                bottom: 0;
                left: 0;
                width: 100%;
                padding: 10px;
                display: flex;
                justify-content: space-around;
                align-items: center;
                background-color: #333;
                color: #aaa;
                }

            .footer a {
                color: inherit;
                text-decoration: none;
                margin: 0 5px;
                }

            .footer i {
                font-size: 18px;
                }
        </style>
    </head>
    <body>
        <div class="container">

            <span class="logo">Kogabe</span>
            <h1 class="title">Initializing...</h1>
            <p class="description">Be prepared to be amazed by our works!</p>
        </div>
        <div class="matrix">
            <span>&#33;</span>
            <span>&#45;</span>
            <span>&#64;</span>
            <span>&#33;</span>
            <span>&#45;</span>
            <span>&#64;</span>
        </div>
                
        <footer class="footer">
            <span>Made by Kogabe with ❤️</span>
            <div class="links">
                <a href="https://instagram.com/kogabe_in">Instagram</a>
                <a href="https://t.me/kogabe_interns">Telegram</a>
            </div>
        </footer>
    </body>
</html>
